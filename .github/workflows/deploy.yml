name: Build and deploy agent host

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/agent-host
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Sync dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Test
        env:
          ALLOW_MOCK_FOUNDRY: 'true'
        run: uv run pytest

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Build and push image
        id: image
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          CONTAINER_REGISTRY_NAME: ${{ vars.CONTAINER_REGISTRY_NAME }}
        run: |
          az acr show --resource-group "$AZURE_RESOURCE_GROUP" --name "$CONTAINER_REGISTRY_NAME" >/dev/null 2>&1 || \
            az acr create --resource-group "$AZURE_RESOURCE_GROUP" --name "$CONTAINER_REGISTRY_NAME" --sku Basic --location "$AZURE_LOCATION"
          REGISTRY_SERVER="$(az acr show --resource-group "$AZURE_RESOURCE_GROUP" --name "$CONTAINER_REGISTRY_NAME" --query loginServer -o tsv)"
          az acr build --registry "$CONTAINER_REGISTRY_NAME" \
            --image "agent-host:${GITHUB_SHA}" \
            --image "agent-host:latest" \
            src/agent-host
          echo "registry-server=$REGISTRY_SERVER" >> "$GITHUB_OUTPUT"
          echo "image=$REGISTRY_SERVER/agent-host:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
      - name: Provision Azure resources
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
          CONTAINER_REGISTRY_NAME: ${{ vars.CONTAINER_REGISTRY_NAME }}
          CONTAINERAPPS_ENVIRONMENT_NAME: ${{ vars.CONTAINERAPPS_ENVIRONMENT_NAME }}
          CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
          BOT_NAME: ${{ vars.BOT_NAME }}
          FOUNDRY_AGENT: ${{ vars.FOUNDRY_AGENT }}
          FOUNDRY_AGENT_VERSION: ${{ vars.FOUNDRY_AGENT_VERSION }}
          FOUNDRY_ACCOUNT_RESOURCE_GROUP: ${{ vars.FOUNDRY_ACCOUNT_RESOURCE_GROUP }}
          FOUNDRY_ACCOUNT_NAME: ${{ vars.FOUNDRY_ACCOUNT_NAME }}
          PROJECT_ENDPOINT: ${{ secrets.PROJECT_ENDPOINT }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
        run: |
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters \
              location="$AZURE_LOCATION" \
              containerImage="${{ steps.image.outputs.image }}" \
              containerRegistryName="$CONTAINER_REGISTRY_NAME" \
              registryServer="${{ steps.image.outputs.registry-server }}" \
              projectEndpoint="$PROJECT_ENDPOINT" \
              foundryAgent="${FOUNDRY_AGENT:-OperationsEngineering}" \
              foundryAgentVersion="$FOUNDRY_AGENT_VERSION" \
              azureTenant="$AZURE_TENANT_ID" \
              m365Tenant="${M365_TENANT_ID:-$AZURE_TENANT_ID}" \
              foundryAccountResourceGroup="$FOUNDRY_ACCOUNT_RESOURCE_GROUP" \
              foundryAccountName="$FOUNDRY_ACCOUNT_NAME" \
              containerAppsEnvironmentName="${CONTAINERAPPS_ENVIRONMENT_NAME:-cae-a365-foundry}" \
              containerAppName="${CONTAINER_APP_NAME:-ca-a365-foundry-agent}" \
              botName="${BOT_NAME:-bot-a365-foundry-agent}"
